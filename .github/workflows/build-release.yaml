name: Build Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      upload_release_assets:
        description: "Upload packaged archives to a GitHub release"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Existing tag to upload assets to when manually triggered"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build-release-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: x86_64-unknown-linux-musl
            release_name: kitepass-cli-linux-x86_64
            use_zigbuild: true
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact_name: aarch64-unknown-linux-musl
            release_name: kitepass-cli-linux-arm64
            use_zigbuild: true
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: x86_64-apple-darwin
            release_name: kitepass-cli-macos-x86_64
            use_zigbuild: false
          - runner: macos-15
            target: aarch64-apple-darwin
            artifact_name: aarch64-apple-darwin
            release_name: kitepass-cli-macos-arm64
            use_zigbuild: false

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: ${{ matrix.use_zigbuild }}
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: ${{ matrix.use_zigbuild }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build release binary with cargo
        if: ${{ !matrix.use_zigbuild }}
        env:
          KITEPASS_CLI_GIT_REVISION: ${{ github.sha }}
        run: cargo build --locked --release --target ${{ matrix.target }} -p kitepass-cli --bin kitepass

      - name: Build release binary with cargo-zigbuild
        if: ${{ matrix.use_zigbuild }}
        env:
          KITEPASS_CLI_GIT_REVISION: ${{ github.sha }}
        run: cargo zigbuild --locked --release --target ${{ matrix.target }} -p kitepass-cli --bin kitepass

      - name: Generate build provenance attestation
        if: ${{ !github.event.repository.private || github.event.repository.owner.type == 'Organization' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: target/${{ matrix.target }}/release/kitepass

      - name: Upload raw binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/kitepass
          if-no-files-found: error

  package-release-archives:
    needs: build-release-binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            release_name: kitepass-cli-linux-x86_64
          - target: aarch64-unknown-linux-musl
            release_name: kitepass-cli-linux-arm64
          - target: x86_64-apple-darwin
            release_name: kitepass-cli-macos-x86_64
          - target: aarch64-apple-darwin
            release_name: kitepass-cli-macos-arm64

    permissions:
      contents: read

    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag || format('manual-{0}', github.run_number) }}

    steps:
      - name: Download raw binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: artifacts/${{ matrix.target }}

      - name: Construct release archive
        shell: bash
        run: |
          release_dir="${{ matrix.release_name }}-${RELEASE_TAG}"
          mkdir -p "${release_dir}"
          mv "artifacts/${{ matrix.target }}/kitepass" "${release_dir}/kitepass"
          chmod 755 "${release_dir}/kitepass"
          tar -czf "${release_dir}.tar.gz" "${release_dir}"
          sha256sum "${release_dir}.tar.gz" > "${release_dir}.tar.gz.sha256"

      - name: Upload packaged archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ matrix.release_name }}-${{ env.RELEASE_TAG }}.tar.gz
            ${{ matrix.release_name }}-${{ env.RELEASE_TAG }}.tar.gz.sha256
          if-no-files-found: error

  upload-release-assets:
    if: >
      github.event_name == 'release'
      || (github.event_name == 'workflow_dispatch' && inputs.upload_release_assets == true && inputs.release_tag != '')
    needs: package-release-archives
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}

    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.tar.gz.sha256
